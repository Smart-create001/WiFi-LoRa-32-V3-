<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - VICI</title>
    <link rel="icon" type="image/png" sizes="16x16" href="LOGO.png"/>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background: #fff;
            overflow-x: hidden;
        }

        /* Navbar Styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #000000;
            border-bottom: 1px solid #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 16px;
            color: #ffffff;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .back-link:hover {
            background-color: rgba(255, 255, 255, 0.178);
        }

        .back-link svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .back-link:hover svg {
            transform: translateX(-3px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family: "Times New Roman", Times, serif;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 16px;
            color: #ffffff;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .contact-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Gallery Section */
        .gallery-section {
            background: url("image/ปก-set-2.webp") center/cover no-repeat;
            padding: 80px 20px;
            position: relative;
        }

        .gallery-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                rgba(0, 0, 0, 0.9) 0%,
                rgba(46, 46, 46, 0.7) 20%,
                rgba(90, 90, 90, 0.5) 40%,
                rgba(140, 140, 140, 0.3) 60%,
                rgba(207, 207, 207, 0.2) 80%,
                rgba(245, 245, 245, 0.2) 100%);
            z-index: 0;
        }

        .gallery-content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-title {
            text-align: center;
            font-size: clamp(2rem, 5vw, 2.5rem);
            margin-bottom: clamp(30px, 5vw, 50px);
            color: #f5f5f5;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        /* Product Card */
        .product-card {
            background: transparent;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .product-card.fade-in-up {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
            border-radius: 12px;
            cursor: pointer;
        }

        .product-card:hover .product-image {
            transform: scale(1.03);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow: auto;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transform: scale(0.8);
            transition: transform 0.3s ease-in-out;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close-button:hover {
            color: #bbb;
        }

        /* Footer */
        footer {
            padding: 30px 0;
            text-align: center;
            background: #1a1a1a;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }
            
            .logo {
                position: static;
                transform: none;
            }
            
            .product-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .product-image {
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="back-link" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18L9 12L15 6" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Back</span>
        </div>
        <div class="logo">VICI</div>
        <div class="contact-link" onclick="location.href='contact.html'">
            <span>Contact Us</span>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="gallery-content">
            <h2 class="gallery-title">Our Gallery</h2>
            
            <div class="product-grid">
                <!-- Product Cards will be generated here -->
                <!-- Example of one product card -->
                <div class="product-card">
                    <img src="image/เจริญกรุง/1.1.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/1.2.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/1.3.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/1.4.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/2.1.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/2.2.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>

                <div class="product-card">
                    <img src="image/เจริญกรุง/2.3.webp" 
                         alt="Gallery Image 1" class="product-image">
                </div>
             
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="contact">
        <div class="container">
            <p>&copy; 2025 VICI. All rights reserved.</p>
        </div>
    </footer>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="close-button">&times;</span>
        <img id="modalImage" class="modal-content">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Animate product cards on scroll
            const animateCards = () => {
                const productCards = document.querySelectorAll('.product-card');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('fade-in-up');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                productCards.forEach(card => observer.observe(card));
            };

            // Image Modal Logic
            const setupModal = () => {
                const imageModal = document.getElementById('imageModal');
                const modalImage = document.getElementById('modalImage');
                const closeButton = document.querySelector('.close-button');

                // Open modal
                document.querySelectorAll('.product-image').forEach(img => {
                    img.addEventListener('click', function() {
                        imageModal.classList.add('active');
                        modalImage.src = this.src;
                        document.body.style.overflow = 'hidden';
                    });
                });

                // Close modal
                const closeModal = () => {
                    imageModal.classList.remove('active');
                    document.body.style.overflow = '';
                };

                closeButton.addEventListener('click', closeModal);
                imageModal.addEventListener('click', (e) => e.target === imageModal && closeModal());
                document.addEventListener('keydown', (e) => e.key === 'Escape' && closeModal());
            };

            // Initialize
            animateCards();
            setupModal();
        });
    </script>
</body>
</html>
